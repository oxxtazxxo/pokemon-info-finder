<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Dashboard</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <!-- Header -->
    <header>
        <h1>Pokemon Dashboard</h1>
    </header>

    <main>
        <!-- Pokemon Search Section -->
        <section class="pokemon-search">
            <form id="pokemon-form">
                <label for="pokemon-input">
                    Search for a Pokemon:
                </label>
                <input
                    type="text"
                    id="pokemon-input"
                    placeholder="Enter a Pokemon name..."
                >
                <button type="submit">
                    Search
                </button>   
            </form>
        </section>
        
        <section id="status">

        </section>
        <section id="results">

        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
