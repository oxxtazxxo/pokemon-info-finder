<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Info Finder</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <!-- HEADER -->
     <header class="site-header">
        <div class="title-area">
            <h1>Pokémon Info Finder</h1>
            <p>Search for a Pokemon and explore its details</p>
        </div>

        <div class="time-area">
            <p>PokéTime://</p>
            <p id="poke-time">--:-- --</p>
        </div>
     </header>
     <main>
        <!-- DASHBOARD LAYOUT -->
         <div class="dashboard-layout">
            <!-- ===========================
                LEFT COLUMN
                CONTAINS:
                - SEARCH PANNEL
                - SELECTED POKEMON
                - POKEDEX ENTRY
                =============================-->
            <div class="left-column">
                <!-- SEARCH PANEL -->
                 <section class="search-pannel">
                    <h2>Search</h2>
                 </section>
            </div>
         </div>
     </main>

     
    <script src="app.js"></script>
</body>
</html>
